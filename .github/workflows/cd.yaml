name: cd

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/cd.yaml'
  workflow_dispatch:

# No remote state locking on Scaleway (no DynamoDB) — serialize runs.
concurrency:
  group: terraform-state
  cancel-in-progress: false

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
  AWS_REGION: fr-par
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }} # github provider PAT (admin:org + repo)
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_dns_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }} # cert-manager DNS-01 Secret
  TF_VAR_github_org: CVVFCM
  TF_VAR_tenancy_id: ${{ secrets.TF_VAR_tenancy_id }}
  TF_VAR_user_id: ${{ secrets.TF_VAR_user_id }}
  TF_VAR_fingerprint: ${{ secrets.TF_VAR_fingerprint }}
  TF_VAR_compartment_id: ${{ secrets.TF_VAR_compartment_id }}
  TF_VAR_private_key_path: ${{ github.workspace }}/terraform/oci_key.pem
  # OCI CLI auth — the kubernetes/helm/kubectl providers exec `oci ce cluster
  # generate-token` to reach the OKE API.
  OCI_CLI_TENANCY: ${{ secrets.TF_VAR_tenancy_id }}
  OCI_CLI_USER: ${{ secrets.TF_VAR_user_id }}
  OCI_CLI_FINGERPRINT: ${{ secrets.TF_VAR_fingerprint }}
  OCI_CLI_KEY_FILE: ${{ github.workspace }}/terraform/oci_key.pem
  OCI_CLI_REGION: eu-paris-1

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v7
      - uses: opentofu/setup-opentofu@v2
      - name: Write key files
        run: |
          printf '%s\n' "${{ secrets.OCI_PRIVATE_KEY }}" > oci_key.pem && chmod 600 oci_key.pem
      - name: Install OCI CLI
        run: |
          pip install --user oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: terraform-linters/setup-tflint@v6
      - run: tflint --init
      - run: tflint
      - run: tofu init -input=false
      - run: tofu fmt -check
      - run: tofu validate
      - run: tofu plan -input=false

  apply:
    needs: plan
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production # required-reviewer approval gate
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v7
      - uses: opentofu/setup-opentofu@v2
      - name: Write key files
        run: |
          printf '%s\n' "${{ secrets.OCI_PRIVATE_KEY }}" > oci_key.pem && chmod 600 oci_key.pem
      - name: Install OCI CLI
        run: |
          pip install --user oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: tofu init -input=false
      - run: tofu apply -auto-approve -input=false
